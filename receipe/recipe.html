<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeBook</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook">
  <meta property="og:description" content="Find delicious recipes for every occasion.">
  <meta property="og:url" content="Your URL">
  <meta property="og:image" content="social-preview-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook">
  <meta name="twitter:description" content="Find delicious recipes for every occasion.">
  <meta name="twitter:image" content="social-preview-image.png">

  <link rel="icon" href="/favicon.ico">

  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="stylesheet" href="recipe.css">
  <script src="recipe.js" defer></script>
</head>
<body>

  <header>
    <div class="logo">
      <img src="images/recipe-book.png" alt="RecipeBook logo icon">
      <span class="logo-text">R<span class="logo-small">ecipe</span>B<span class="logo-small">ook</span></span>
    </div>

    <div class="search-bar">
      <input type="search" placeholder="Find a recipe" aria-label="Find a recipe">
      <button type="button" aria-label="Search">
        <img src="images/search.svg" alt="search icon">
      </button>
    </div>
  </header>

  <main></main>

  <footer>
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <a href="" aria-label="Instagram"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
      <a href="" aria-label="YouTube"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
      <a href="" aria-label="Pinterest"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
  </footer>

  <script src="recipe.js"></script>
</body>
</html>
